[tool.coverage.run]
branch = true
source = [ "billing_partner_portal_billing_api" ]

[tool.coverage.report]
exclude_lines = [ "if TYPE_CHECKING:" ]
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --cov
 --cov-report html:'../../coverage/packages/billing_api/html'
 --cov-report xml:'../../coverage/packages/billing_api/coverage.xml'
 --html='../../reports/packages/billing_api/unittests/html/index.html'
 --junitxml='../../reports/packages/billing_api/unittests/junit.xml'
"""

[tool.hatch.build.targets.wheel]
packages = [ "billing_partner_portal_billing_api" ]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
exclude = [ ".ruff_cache", ".svn", ".tox", ".venv", "dist" ]
line-length = 120
indent-width = 4

  [tool.ruff.lint]
  select = [ "E", "F", "UP", "B", "SIM", "I" ]
  ignore = [ ]
  fixable = [ "ALL" ]
  unfixable = [ ]

[project]
name = "billing_partner_portal.billing_api"
version = "1.0.0"
description = "Automatically generated by Nx."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
  "fastapi==0.135.1",
  "uvicorn==0.41.0",
  "aws-lambda-powertools==3.25.0",
  "aws-lambda-powertools[tracer]==3.25.0",
  "billing_partner_portal.agents",
  "python-dotenv==1.2.2",
  "boto3>=1.42.0",
]

[build-system]
requires = [ "hatchling" ]
build-backend = "hatchling.build"

[dependency-groups]
dev = [ "fastapi[standard]==0.135.1" ]
