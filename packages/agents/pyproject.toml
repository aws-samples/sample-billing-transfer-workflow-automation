[tool.coverage.run]
branch = true
source = [ "billing_partner_portal_agents" ]

[tool.coverage.report]
exclude_lines = [ "if TYPE_CHECKING:" ]
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --cov
 --cov-report html:'../../coverage/packages/agents/html'
 --cov-report xml:'../../coverage/packages/agents/coverage.xml'
 --html='../../reports/packages/agents/unittests/html/index.html'
 --junitxml='../../reports/packages/agents/unittests/junit.xml'
"""

[tool.hatch.build.targets.wheel]
packages = [ "billing_partner_portal_agents" ]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
exclude = [ ".ruff_cache", ".svn", ".tox", ".venv", "dist" ]
line-length = 120
indent-width = 4

  [tool.ruff.lint]
  select = [ "E", "F", "UP", "B", "SIM", "I" ]
  ignore = [ ]
  fixable = [ "ALL" ]
  unfixable = [ ]

[project]
name = "billing_partner_portal.agents"
version = "1.0.0"
description = "Automatically generated by Nx."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
  "aws-lambda-powertools==3.25.0",
  "aws-opentelemetry-distro==0.15.0",
  "bedrock-agentcore==0.1.7",
  "fastapi==0.135.1",
  "boto3==1.42.63",
  "mcp==1.26.0",
  "strands-agents==1.29.0",
  "strands-agents-tools==0.2.22",
  "uvicorn==0.41.0"
]

[build-system]
requires = [ "hatchling" ]
build-backend = "hatchling.build"

[dependency-groups]
dev = [ "fastapi[standard]==0.135.1" ]
